<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcenaria Oliveira's</title>

  <style>
    html {
      scroll-behavior: smooth;
    }
  </style>
</head>

<body>

  <!-- MENU ORIGINAL (mantém seu estilo, só garante os links) -->
  <nav>
    <ul>
      <li><a href="#servicos">Serviços</a></li>
      <li><a href="#portfolio">Portfólio</a></li>
      <li><a href="#contato">Contato</a></li>
    </ul>
  </nav>

  <!-- CONTEÚDO (mantém tudo, só adiciona os IDs) -->

  <section>
    <h1>Topo do site</h1>
  </section>

  <!-- ✅ CORREÇÃO -->
  <section id="servicos">
    <h2>Serviços</h2>
    <p>Conteúdo original aqui</p>
  </section>

  <!-- ✅ CORREÇÃO -->
  <section id="portfolio">
    <h2>Portfólio</h2>
    <p>Conteúdo original aqui</p>
  </section>

  <!-- ✅ CORREÇÃO -->
  <section id="contato">
    <h2>Contato</h2>
    <p>Conteúdo original aqui</p>
  </section>

  <!-- ✅ SCRIPT (somente se necessário) -->
  <script>
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener("click", function(e) {
        const target = document.querySelector(this.getAttribute("href"));
        if (target) {
          e.preventDefault();
          target.scrollIntoView({ behavior: "smooth" });
        }
      });
    });
  </script>

</body>
</html>

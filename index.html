<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marcenaria Oliveira's | Móveis Planejados</title>

<meta name="description" content="Marcenaria Oliveira's especializada em móveis planejados em Maringá, Sarandi e Paiçandu.">

<link rel="icon" href="img/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

:root{
--azul:#234255;
--azul-escuro:#1b3443;
--cinza:#f4f4f4;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
padding-top:90px;
color:#333;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
background:#1b3443;
color:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 8%;
z-index:1000;
}

.logo img{
height:50px;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:25px;
font-weight:500;
}

/* HERO */

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.55),rgba(0,0,0,.55)),
url('img/hero-cozinha.jpg') center/cover no-repeat;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:#fff;
padding:20px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
max-width:700px;
margin-bottom:30px;
font-size:20px;
}

.btn{
background:var(--azul);
color:#fff;
padding:15px 35px;
border-radius:6px;
text-decoration:none;
font-weight:600;
display:inline-block;
transition:0.3s;
}

.btn:hover{
background:var(--azul-escuro);
}

/* SEÇÕES */

section{
padding:100px 8%;
}

.titulo{
text-align:center;
margin-bottom:60px;
color:var(--azul);
font-size:32px;
}

/* SERVIÇOS */

.servicos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:var(--cinza);
padding:40px;
border-radius:10px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-8px);
}

/* SOBRE */

.sobre{
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
align-items:center;
}

.sobre img{
width:100%;
border-radius:10px;
}

/* PORTFÓLIO */

.portfolio{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
}

.portfolio img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:.3s;
}

.portfolio img:hover{
transform:scale(1.05);
}

/* CTA */

.cta{
background:var(--azul);
color:#fff;
text-align:center;
padding:80px 20px;
}

/* FOOTER */

footer{
background:#1b3443;
color:#fff;
text-align:center;
padding:40px 20px;
}

/* BOTÃO WHATSAPP */

.whatsapp{
position:fixed;
bottom:25px;
right:25px;
width:60px;
height:60px;
background:#25d366;
color:#fff;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
text-decoration:none;
box-shadow:0 8px 20px rgba(0,0,0,.25);
z-index:999;
transition:0.3s;
}

.whatsapp:hover{
transform:scale(1.1);
}

@media(max-width:768px){

.sobre{
grid-template-columns:1fr;
}

.hero h1{
font-size:32px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
<a href="#">
<img src="img/logo.png" alt="Marcenaria Oliveiras">
</a>
</div>

<nav>
<a href="#servicos">Serviços</a>
<a href="#sobre">Sobre</a>
<a href="#portfolio">Portfólio</a>
<a href="#contato">Contato</a>
</nav>

</header>

<main>

<section class="hero">

<h1>Móveis Planejados Sob Medida</h1>

<p>Projetos personalizados com acabamento profissional em Maringá e região.</p>

<a class="btn"
href="https://wa.me/554491438651?text=Olá%20vim%20pelo%20site%20da%20Marcenaria%20Oliveiras%20e%20gostaria%20de%20um%20orçamento"
target="_blank">

Solicitar Orçamento

</a>

</section>

<section class="cta" id="contato">

<h2>Vamos transformar seu projeto em realidade?</h2>

<br>

<a class="btn"
href="https://wa.me/554491438651?text=Olá%20quero%20um%20orçamento%20de%20móveis%20planejados"
target="_blank">

Falar no WhatsApp

</a>

</section>

</main>

<footer>

<p>© 2026 Marcenaria Oliveira's - Todos os direitos reservados</p>

</footer>

<a class="whatsapp"
href="https://wa.me/554491438651?text=Olá%20vim%20pelo%20site%20da%20Marcenaria%20Oliveiras%20e%20gostaria%20de%20um%20orçamento"
target="_blank"
rel="noopener noreferrer"
title="Falar no WhatsApp">

<i class="fab fa-whatsapp"></i>

</a>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marcenaria Oliveira's</title>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: #000;
      padding: 15px;
      z-index: 1000;
      text-align: center;
    }

    nav a {
      color: #fff;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    section {
      height: 100vh;
      padding-top: 80px;
    }

    #topo {
      background: #333;
      color: #fff;
    }

    #servicos {
      background: #f5f5f5;
    }

    #portfolio {
      background: #ddd;
    }

    #contato {
      background: #bbb;
    }
  </style>
</head>

<body>

  <!-- MENU -->
  <nav>
    <a href="#servicos">Serviços</a>
    <a href="#portfolio">Portfólio</a>
    <a href="#contato">Contato</a>
  </nav>

  <!-- TOPO -->
  <section id="topo">
    <h1>Marcenaria Oliveira's</h1>
  </section>

  <!-- ✅ SERVIÇOS (ID CORRIGIDO) -->
  <section id="servicos">
    <h2>Serviços</h2>
  </section>

  <!-- ✅ PORTFOLIO (ID CORRIGIDO) -->
  <section id="portfolio">
    <h2>Portfólio</h2>
  </section>

  <!-- ✅ CONTATO (ID CORRIGIDO) -->
  <section id="contato">
    <h2>Contato</h2>
  </section>

</body>
</html>

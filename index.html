<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marcenaria Oliveira's | Móveis Planejados</title>

<meta name="description" content="Marcenaria Oliveira's especializada em móveis planejados em Maringá, Paiçandu e região.">

<link rel="icon" href="img/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Montserrat',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:#ffffff;
color:#333;
}

/* HEADER */

header{
position:fixed;
top:0;
width:100%;
background:#1b3443;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.logo img{
height:50px;
}

nav a{
color:#fff;
text-decoration:none;
margin-left:25px;
font-weight:500;
}

/* HERO */

.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),
url("img/hero-cozinha.jpg") center/cover;

display:flex;
align-items:center;
justify-content:center;
text-align:center;
color:#fff;
padding:20px;
}

.hero h1{
font-size:48px;
margin-bottom:20px;
}

.hero p{
max-width:700px;
margin-bottom:30px;
}

.btn{
background:#234255;
color:#fff;
padding:15px 35px;
border-radius:6px;
text-decoration:none;
}

/* SEÇÕES */

section{
padding:100px 8%;
}

.titulo{
text-align:center;
font-size:32px;
margin-bottom:60px;
color:#234255;
}

/* SERVIÇOS */

.servicos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#f4f4f4;
padding:40px;
border-radius:10px;
text-align:center;
}

/* PORTFÓLIO PINTEREST */

.portfolio{
background:#f7f7f7;
}

.galeria{
column-count:3;
column-gap:15px;
}

.galeria img{
width:100%;
margin-bottom:15px;
border-radius:10px;
transition:0.3s;
cursor:pointer;
}

.galeria img:hover{
transform:scale(1.03);
}

/* RESPONSIVO */

@media(max-width:900px){

.galeria{
column-count:2;
}

}

@media(max-width:600px){

.galeria{
column-count:1;
}

.hero h1{
font-size:32px;
}

}

/* FOOTER */

footer{
background:#1b3443;
color:#fff;
text-align:center;
padding:40px 20px;
}

/* WHATSAPP */

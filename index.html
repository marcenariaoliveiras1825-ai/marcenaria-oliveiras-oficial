<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Marcenaria Oliveira's | Móveis Planejados</title>

<meta name="description" content="Marcenaria Oliveira's especializada em móveis planejados em Maringá, Paiçandu e região.">

<link rel="icon" href="img/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Montserrat',sans-serif;}
html{scroll-behavior:smooth;}
body{background:#fff;color:#333;}

section{
scroll-margin-top:120px;
padding:100px 8%;
}

/* HEADER */
header{
position:fixed;
top:0;
width:100%;
background:#1b3443;
padding:20px 8%;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
flex-wrap:wrap;
}

.logo img{height:50px;}

/* MENU */
.menu{
display:flex;
align-items:center;
}

.menu a{
color:#fff;
text-decoration:none;
margin-left:25px;
}

/* SOCIAL */
.social{
display:flex;
gap:12px;
}

.social a{
color:#fff;
font-size:18px;
width:36px;
height:36px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
background:rgba(255,255,255,0.08);
transition:0.3s;
}

.social a:hover{
background:#c9a96e;
color:#1b3443;
}

/* HERO */
.hero{
height:100vh;
background:
linear-gradient(rgba(0,0,0,.4),rgba(0,0,0,.4)),
url("img/hero-cozinha.jpg") center/cover;
display:flex;
align-items:flex-end;
padding:80px 8%;
color:#fff;
}

.hero h1{font-size:40px;}
.hero p{font-size:18px;}

/* TITULO */
.titulo{
text-align:center;
font-size:32px;
margin-bottom:60px;
color:#234255;
}

/* SEÇÕES */
.sobre-container{
display:grid;
grid-template-columns:1.2fr 1fr;
gap:60px;
max-width:1100px;
margin:auto;
}

.sobre-imagem img{
width:100%;
border-radius:10px;
}

.servicos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#f4f4f4;
padding:40px;
border-radius:10px;
text-align:center;
}

.portfolio{background:#f7f7f7;}

.galeria{
column-count:3;
column-gap:15px;
}

.galeria img{
width:100%;
margin-bottom:15px;
border-radius:10px;
}

/* CONTATO */
.contato-container{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:40px;
}

.formulario{
display:flex;
flex-direction:column;
gap:10px;
}

.formulario input,
.formulario textarea{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

/* FOOTER */
footer{
background:#1b3443;
color:#fff;
text-align:center;
padding:30px;
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:15px;
right:15px;
background:#25d366;
color:#fff;
padding:12px 18px;
border-radius:50px;
text-decoration:none;
font-weight:600;
}

/* MOBILE */
@media(max-width:600px){

header{
flex-direction:column;
align-items:center;
gap:10px;
}

/* MENU MOBILE */
.menu{
flex-direction:column;
gap:10px;
}

.menu a{
margin:0;
}

/* SOCIAL MOBILE */
.social{
justify-content:center;
margin-top:5px;
}

.social a{
width:44px;
height:44px;
font-size:20px;
}

/* HERO */
.hero{
text-align:center;
align-items:center;
}

/* GRID */
.sobre-container{
grid-template-columns:1fr;
}

.galeria{
column-count:1;
}

.contato-container{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<div class="logo">
<a href="#topo"><img src="img/logo.png"></a>
</div>

<nav class="menu">
<a href="#sobre">Quem Somos</a>
<a href="#servicos">Serviços</a>
<a href="#portfolio">Portfólio</a>
<a href="#contato">Contato</a>
</nav>

<div class="social">
  <a href="https://www.instagram.com/marcenaria_oliveiras" target="_blank">
    <i class="fab fa-instagram"></i>
  </a>
  <a href="https://www.facebook.com/r.oliveira.marcenaria/" target="_blank">
    <i class="fab fa-facebook"></i>
  </a>
</div>

</header>

<section class="hero" id="topo">
<div>
<h1>Móveis Planejados Sob Medida</h1>
<p>Projetos exclusivos que unem estética, funcionalidade e acabamento de alto padrão.</p>
</div>
</section>

<footer>
<p>© 2026 Marcenaria Oliveira's</p>
</footer>

<a class="whatsapp" href="https://wa.me/554491438651">
WhatsApp
</a>

</body>
</html>
